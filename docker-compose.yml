
version: '3.8'

services:
  sql:
    image: postgres:15-alpine
    container_name: sql
    environment:
      POSTGRES_USER: alumno
      POSTGRES_PASSWORD: alumno
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - sql_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net

  pgadmin4:
    image: dpage/pgadmin4
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - ecommerce-net

volumes:
  sql_data:

networks:
  ecommerce-net:
    name: ecommerce-net
    driver: bridge

